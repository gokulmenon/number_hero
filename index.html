<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Hero: Learn in 3 Languages!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Tile Animation */
        .tile {
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s ease;
            touch-action: manipulation;
        }
        .tile:active {
            transform: scale(0.92);
        }

        /* Modal Animation */
        #modal-overlay { transition: opacity 0.3s ease; }
        #modal-content { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease; }
        
        .number-text {
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }

        /* Loading Animation */
        .dot-flashing {
            position: relative;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: currentColor;
            color: currentColor;
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: 0.5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: "";
            display: inline-block;
            position: absolute;
            top: 0;
        }
        .dot-flashing::before {
            left: -10px;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: currentColor;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 0s;
        }
        .dot-flashing::after {
            left: 10px;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: currentColor;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 1s;
        }
        @keyframes dot-flashing {
            0% { background-color: currentColor; }
            50%, 100% { background-color: rgba(100, 100, 100, 0.2); }
        }

        /* Language Toggle Styles */
        input[type="radio"]:checked + span {
            background-color: #4f46e5;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
        }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col overflow-hidden text-slate-800 bg-slate-50">

    <header class="flex-none pt-4 pb-3 px-4 md:px-8 bg-white shadow-sm z-10 relative flex flex-col md:flex-row items-center justify-between gap-4 shrink-0">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500"></div>
        
        <div class="text-center md:text-left">
            <h1 class="text-2xl md:text-3xl font-black text-indigo-600 tracking-tight">Number Hero</h1>
            <p class="text-xs md:text-sm text-slate-500 font-bold mt-1">Tap a number to hear its name!</p>
        </div>
        
        <!-- Language Selector -->
        <div class="flex w-full max-w-sm md:w-[340px] bg-slate-100 p-1 rounded-full shadow-inner">
            <label class="flex-1 cursor-pointer">
                <input type="radio" name="language" value="en" class="hidden" checked onchange="changeLanguage()">
                <span class="block text-center py-2 rounded-full text-sm font-bold text-slate-600 transition-all duration-200">English</span>
            </label>
            <label class="flex-1 cursor-pointer">
                <input type="radio" name="language" value="es" class="hidden" onchange="changeLanguage()">
                <span class="block text-center py-2 rounded-full text-sm font-bold text-slate-600 transition-all duration-200">Español</span>
            </label>
            <label class="flex-1 cursor-pointer">
                <input type="radio" name="language" value="hi" class="hidden" onchange="changeLanguage()">
                <span class="block text-center py-2 rounded-full text-sm font-bold text-slate-600 transition-all duration-200">हिन्दी</span>
            </label>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-2 md:p-6 flex justify-center">
        <div class="w-full max-w-3xl">
            <div id="grid-container" class="grid grid-cols-5 md:grid-cols-10 gap-2 md:gap-3 pb-20">
                <!-- Numbers will be populated here by JS -->
            </div>
        </div>
    </main>

    <!-- Modal overlay -->
    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm opacity-0 pointer-events-none" aria-hidden="true">
        
        <div id="modal-content" class="bg-white w-full max-w-sm md:max-w-md rounded-3xl shadow-2xl overflow-hidden transform scale-90 opacity-0 flex flex-col max-h-[90vh]">
            
            <div id="modal-header-bg" class="p-6 text-center bg-indigo-500 text-white relative overflow-hidden shrink-0">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full"></div>
                <div class="absolute top-10 -left-10 w-20 h-20 bg-white/10 rounded-full"></div>

                <div class="relative z-10 flex flex-col items-center">
                    <span id="modal-language-badge" class="inline-block px-3 py-1 bg-black/20 rounded-full text-xs font-bold uppercase tracking-wider mb-2">
                        English
                    </span>
                    <div class="text-5xl md:text-6xl font-black text-white mt-2 number-text drop-shadow-md">
                        <span id="modal-number-digit">1</span>
                    </div>
                </div>
                
                <button id="close-btn" class="absolute top-4 right-4 p-2 bg-black/20 hover:bg-black/30 text-white rounded-full transition z-20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="p-6 flex-1 overflow-y-auto flex flex-col items-center justify-center">
                
                <!-- Target Language Word -->
                <div class="mb-2 text-center w-full">
                    <h2 id="modal-word-target" class="text-4xl md:text-5xl font-black text-slate-800 break-words leading-tight">
                        One
                    </h2>
                </div>

                <!-- English Translation (hidden when English is selected) -->
                <div id="modal-word-english-box" class="mb-6 text-center w-full hidden">
                    <span class="text-lg font-bold text-slate-400" id="modal-word-english">
                        (One)
                    </span>
                </div>

                <!-- Pronunciation Button -->
                <div class="w-full max-w-[200px] mt-2">
                    <button id="btn-pronounce" class="w-full flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-200 hover:bg-indigo-50 transition group shadow-sm">
                        <span class="text-4xl mb-2 group-hover:scale-110 transition-transform">🔊</span>
                        <span class="text-sm font-black text-slate-600 group-hover:text-indigo-600 uppercase tracking-wide" id="btn-pronounce-text">Say It</span>
                        <div id="loader-pronounce" class="hidden mt-3 mb-1"><div class="dot-flashing text-indigo-500"></div></div>
                    </button>
                    <p id="error-message" class="text-xs text-red-500 font-bold text-center mt-3 hidden">Couldn't load audio. Please try again.</p>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-t border-slate-100 shrink-0 text-center">
                <button onclick="closeModal()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 transition transform active:scale-95">
                    Got it!
                </button>
            </div>
        </div>
    </div>

    <script>
        // System injects API Key at runtime
        const apiKey = ""; 
        let currentAudio = null;
        let selectedLang = 'en'; // Default language

        // --- Dictionaries & Logic ---

        // English: Generated via logic
        function getEnglishWord(n) {
            const ones = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine"];
            const teens = ["Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
            const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
            
            if (n === 100) return "One Hundred";
            if (n < 10) return ones[n];
            if (n < 20) return teens[n - 10];
            return tens[Math.floor(n / 10)] + (n % 10 !== 0 ? " " + ones[n % 10] : "");
        }

        // Spanish: Generated via logic
        function getSpanishWord(n) {
            const ones = ["", "Uno", "Dos", "Tres", "Cuatro", "Cinco", "Seis", "Siete", "Ocho", "Nueve"];
            const teens = ["Diez", "Once", "Doce", "Trece", "Catorce", "Quince", "Dieciséis", "Diecisiete", "Dieciocho", "Diecinueve"];
            const twenties = ["Veinte", "Veintiuno", "Veintidós", "Veintitrés", "Veinticuatro", "Veinticinco", "Veintiséis", "Veintisiete", "Veintiocho", "Veintinueve"];
            const tens = ["", "", "", "Treinta", "Cuarenta", "Cincuenta", "Sesenta", "Setenta", "Ochenta", "Noventa"];

            if (n === 100) return "Cien";
            if (n < 10) return ones[n];
            if (n < 20) return teens[n - 10];
            if (n < 30) return twenties[n - 20];
            
            const t = Math.floor(n / 10);
            const o = n % 10;
            return tens[t] + (o > 0 ? " y " + ones[o].toLowerCase() : "");
        }

        // Hindi: Using exact phonetics array due to complex irregularities
        const hindiWords = [
            "", "Ek", "Do", "Teen", "Chaar", "Paanch", "Chhah", "Saat", "Aath", "Nau", "Das",
            "Gyaarah", "Baarah", "Terah", "Chaudah", "Pandrah", "Solah", "Satrah", "Athaarah", "Unnees", "Bees",
            "Ikkees", "Baaees", "Te-ees", "Chaubees", "Pachees", "Chhabees", "Sattaees", "Athaees", "Untees", "Tees",
            "Ikattees", "Battees", "Taintees", "Chauntees", "Paintees", "Chhattees", "Saintees", "Adtees", "Untaalees", "Chaalees",
            "Iktaalees", "Bayaalees", "Taitaalees", "Chauvaalees", "Paintaalees", "Chhiyaalees", "Saintaalees", "Adtaalees", "Unchaas", "Pachaas",
            "Ikyaavan", "Baavan", "Tirpan", "Chauvan", "Pachpan", "Chhappan", "Sattaavan", "Athaavan", "Unsath", "Saath",
            "Iksath", "Baasath", "Tirsath", "Chausath", "Painsath", "Chhiyasath", "Sarsath", "Adasath", "Unhattar", "Sattar",
            "Ikhattar", "Bahattar", "Tihattar", "Chauhattar", "Pachhattar", "Chhihattar", "Satahattar", "Athahattar", "Unnaasee", "Assee",
            "Ikyaasee", "Bayaasee", "Tiraasee", "Chauraasee", "Pachaasee", "Chhiyaasee", "Sattaasee", "Athaasee", "Navaasee", "Nabbe",
            "Ikyaanave", "Baanave", "Tiraanave", "Chauraanave", "Pachaanave", "Chhiyaanave", "Sattaanave", "Athaanave", "Ninyaanave", "Sau"
        ];

        function getHindiWord(n) {
            return hindiWords[n];
        }

        function getTranslation(num, lang) {
            if (lang === 'en') return getEnglishWord(num);
            if (lang === 'es') return getSpanishWord(num);
            if (lang === 'hi') return getHindiWord(num);
        }

        function getLanguageName(lang) {
            if (lang === 'en') return 'English';
            if (lang === 'es') return 'Español';
            if (lang === 'hi') return 'Hindi';
        }

        // --- Initialization ---

        const gridContainer = document.getElementById('grid-container');
        const colors = [
            'bg-blue-100 text-blue-600 border-blue-200',
            'bg-indigo-100 text-indigo-600 border-indigo-200',
            'bg-purple-100 text-purple-600 border-purple-200', 
            'bg-pink-100 text-pink-600 border-pink-200',
            'bg-rose-100 text-rose-600 border-rose-200',
            'bg-orange-100 text-orange-600 border-orange-200',
            'bg-amber-100 text-amber-600 border-amber-200',
            'bg-emerald-100 text-emerald-600 border-emerald-200',
            'bg-teal-100 text-teal-600 border-teal-200',
            'bg-cyan-100 text-cyan-600 border-cyan-200',
        ];

        // Build the 1-100 Grid
        for (let i = 1; i <= 100; i++) {
            const btn = document.createElement('button');
            const colorClass = colors[(i - 1) % 10]; 
            const isSpecial = (i % 10 === 0);
            
            btn.className = `
                tile group relative w-full aspect-square rounded-2xl border-b-4 
                flex flex-col items-center justify-center 
                ${isSpecial ? 'bg-gradient-to-br from-indigo-500 to-purple-600 text-white border-purple-700 shadow-purple-200' : colorClass}
            `;
            
            btn.innerHTML = `
                <span class="text-2xl md:text-3xl font-black number-text drop-shadow-sm">${i}</span>
            `;

            btn.onclick = () => openModal(i);
            gridContainer.appendChild(btn);
        }

        // --- Interaction Logic ---

        function changeLanguage() {
            const radios = document.getElementsByName('language');
            for (const radio of radios) {
                if (radio.checked) {
                    selectedLang = radio.value;
                    break;
                }
            }
        }

        // --- Modal Logic ---

        const modalOverlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');

        function openModal(number) {
            const word = getTranslation(number, selectedLang);
            const englishWord = getEnglishWord(number);
            
            document.getElementById('modal-number-digit').textContent = number;
            document.getElementById('modal-language-badge').textContent = getLanguageName(selectedLang);
            document.getElementById('modal-word-target').textContent = word;

            const englishBox = document.getElementById('modal-word-english-box');
            if (selectedLang !== 'en') {
                document.getElementById('modal-word-english').textContent = `(${englishWord})`;
                englishBox.classList.remove('hidden');
            } else {
                englishBox.classList.add('hidden');
            }

            // Reset AI Feature UI
            document.getElementById('loader-pronounce').classList.add('hidden');
            document.getElementById('error-message').classList.add('hidden');
            
            const btnText = document.getElementById('btn-pronounce-text');
            btnText.textContent = "Say It";

            document.getElementById('btn-pronounce').onclick = () => fetchPronunciation(word, selectedLang);

            // Set Header Color
            const headerColors = ['bg-blue-500', 'bg-indigo-500', 'bg-purple-500', 'bg-pink-500', 'bg-rose-500', 'bg-orange-500', 'bg-emerald-500', 'bg-teal-500'];
            const header = document.getElementById('modal-header-bg');
            headerColors.forEach(c => header.classList.remove(c));
            
            if (number === 100) header.classList.add('bg-yellow-500');
            else header.classList.add(headerColors[number % headerColors.length]);

            // Shrink text if word is very long
            const titleEl = document.getElementById('modal-word-target');
            if (word.length > 12) {
                titleEl.classList.remove('text-4xl', 'md:text-5xl');
                titleEl.classList.add('text-3xl', 'md:text-4xl');
            } else {
                titleEl.classList.add('text-4xl', 'md:text-5xl');
                titleEl.classList.remove('text-3xl', 'md:text-4xl');
            }

            modalOverlay.classList.remove('pointer-events-none', 'opacity-0');
            modalContent.classList.remove('scale-90', 'opacity-0');
            modalContent.classList.add('scale-100', 'opacity-100');
        }

        function closeModal() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            modalOverlay.classList.add('opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-90', 'opacity-0');
            
            setTimeout(() => {
                modalOverlay.classList.add('pointer-events-none');
            }, 300);
        }

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
        document.getElementById('close-btn').addEventListener('click', closeModal);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // --- Gemini Integration for Text-to-Speech ---

        async function fetchPronunciation(word, language) {
            const btn = document.getElementById('btn-pronounce');
            const loader = document.getElementById('loader-pronounce');
            const errorMsg = document.getElementById('error-message');
            
            if (window.currentAudio) window.currentAudio.pause();
            const audioObj = new Audio();
            window.currentAudio = audioObj;
            
            btn.disabled = true;
            loader.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                // Use built-in natural language speech controls to prevent conversational output
                // and correctly guide the pronunciation accent without causing 'OTHER' errors.
                let promptCommand = `Say clearly: ${word}`;
                if (language === 'es') promptCommand = `Say clearly with a Spanish accent: ${word}`;
                if (language === 'hi') promptCommand = `Say clearly with an Indian accent: ${word}`;

                const payload = {
                    contents: [{
                        parts: [{ text: promptCommand }]
                    }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { 
                            voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } 
                        }
                    },
                    model: "gemini-2.5-flash-preview-tts"
                };

                let result = null;
                let attempt = 0;
                let delays = [1000, 2000, 4000];
                
                // CACHE BUSTER: We added &v=2 to bypass the poisoned cache!
                const fetch_url = `/api/audio?word=${encodeURIComponent(word)}&lang=${encodeURIComponent(language)}&v=2`;
                
                while (attempt < 3 && !result) {
                    try {
                        const response = await fetch(fetch_url);
                        
                        if (response.ok) {
                            result = await response.json();
                        } else {
                            if (response.status === 429) {
                                attempt = 99; // Force loop to stop
                                throw new Error("Rate limit exceeded. Please wait 60 seconds.");
                            }
                            throw new Error('API Request Failed');
                        }
                    } catch (e) {
                        attempt++;
                        if (attempt < 3) await new Promise(r => setTimeout(r, delays[attempt-1]));
                        else throw e;
                    }
                }

                if (!result || !result.candidates || !result.candidates[0].content) {
                    throw new Error("Failed to generate audio content.");
                }

                // Extract and decode PCM audio
                const base64Audio = result.candidates[0].content.parts[0].inlineData.data;
                const binaryString = window.atob(base64Audio);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Convert to WAV and play
                const blob = createWavFile(bytes);
                const url = URL.createObjectURL(blob);
                
                audioObj.src = url;
                await audioObj.play();

            } catch (error) {
                console.error("Final TTS Error:", error);
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        // --- Helper Function: PCM to WAV ---
        function createWavFile(pcmData) {
            const sampleRate = 24000; 
            const numChannels = 1;
            const bitsPerSample = 16;
            const dataSize = pcmData.length;
            
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);
            
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // 1 = PCM format
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); // byteRate
            view.setUint16(32, 2, true); // blockAlign
            view.setUint16(34, bitsPerSample, true);
            writeString(36, 'data');
            view.setUint32(40, dataSize, true);
            
            const pcmView = new Uint8Array(buffer, 44);
            pcmView.set(pcmData);
            
            return new Blob([buffer], { type: 'audio/wav' });
        }
    </script>
</body>
</html>
